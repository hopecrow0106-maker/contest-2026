<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한-아랍 스타트업 아이디어 공모전</title>
  <style>
    :root{
      --bg:#ffffff;
      --text:#111;
      --muted:#6b7280;
      --line:#e5e7eb;
      --brand:#1f2a6d;   /* 버튼 테두리 컬러(진한 남색) */
      --card:#f6f7fb;    /* 하단 카드 배경 */
      --max:1100px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", Arial, sans-serif;
      color:var(--text);
      background:var(--bg);
    }
    a{color:inherit; text-decoration:none}
    .topbar{
      border-bottom:1px solid var(--line);
      background:#fff;
    }
    .topbar-inner{
      max-width:var(--max);
      margin:0 auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
    }
    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
    }
    .logo{
      width:28px; height:28px;
      border-radius:999px;
      background: conic-gradient(from 180deg, #0ea5e9, #22c55e, #ef4444, #0ea5e9);
      flex:0 0 auto;
    }
    .brand-text{
      display:flex;
      flex-direction:column;
      line-height:1.15;
      min-width:0;
    }
    .brand-text strong{
      font-size:14px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .brand-text span{
      font-size:12px;
      color:var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .page-title{
      font-weight:700;
      font-size:14px;
      color:#111;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .banner{
      width:100%;
      background:#fff;
      border-bottom:1px solid var(--line);
    }
    .banner img{
      width:100%;
      display:block;
      max-height:420px;
      object-fit:cover;
    }

    .content{
      max-width:var(--max);
      margin:0 auto;
      padding:26px 18px 40px;
    }

    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:22px;
      display:grid;
      grid-template-columns: 1fr 1.6fr;
      gap:18px;
      align-items:center;
    }
    @media (max-width: 860px){
      .panel{grid-template-columns:1fr}
    }

    .contact h3{
      margin:0 0 10px;
      font-size:16px;
    }
    .contact .row{
      padding:10px 0;
      border-bottom:1px solid rgba(0,0,0,.06);
      font-size:14px;
    }
    .contact .label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:18px;
      justify-content:flex-end;
    }
    @media (max-width: 860px){
      .actions{justify-content:flex-start}
    }

    .circle-link{
      width:130px;
      height:130px;
      border-radius:999px;
      border:5px solid var(--brand);
      background:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:8px;
      box-shadow:0 6px 16px rgba(0,0,0,.06);
      transition: transform .08s ease, box-shadow .15s ease;
      text-align:center;
      padding:10px;
    }
    .circle-link:hover{
      transform: translateY(-1px);
      box-shadow:0 10px 22px rgba(0,0,0,.10);
    }
    .icon{
      width:44px; height:44px;
      display:grid;
      place-items:center;
      border-radius:12px;
      background: rgba(31,42,109,.08);
      color: var(--brand);
      font-weight:800;
      font-size:18px;
    }
    .circle-link .t{
      font-size:14px;
      font-weight:800;
      letter-spacing:-0.2px;
    }
    .circle-link .s{
      font-size:12px;
      color:var(--muted);
      line-height:1.2;
    }

    footer{
      border-top:1px solid var(--line);
      padding:18px;
      color:var(--muted);
      text-align:center;
      font-size:12px;
      background:#fff;
    }

    .note{
      margin-top:14px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
    .pill{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      background:#fff;
      font-size:12px;
      color:#111;
      margin-right:6px;
      margin-top:6px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div class="brand-text">
          <strong>한국-아랍소사이어티</strong>
          <span>Korea-Arab Society</span>
        </div>
      </div>
      <div class="page-title">2026 한-아랍 스타트업 아이디어 공모전</div>
    </div>
  </div>

  <div class="banner">
    <!-- ✅ assets/banner.png 가 있어야 합니다 -->
    <img src="assets/banner.png" alt="공모전 배너" />
  </div>

  <div class="content">
    <div class="panel">
      <div class="contact">
        <h3>문의사항</h3>

        <div class="row">
          <span class="label">전화</span>
          <div>02-XXXX-XXXX</div>
        </div>

        <div class="row">
          <span class="label">이메일</span>
          <div>korearstartup@contestweb.net</div>
        </div>

        <div class="note">
          <span class="pill">접수기간</span>
          <span class="pill">2026. XX. XX ~ XX. XX</span>
          <div style="margin-top:8px;">
            ※ 위 정보는 샘플입니다. 실제 연락처/기간으로 교체하세요.
          </div>
        </div>
      </div>

      <div class="actions">
        <a class="circle-link" href="guideline.html">
          <div class="icon">📄</div>
          <div class="t">공모요강</div>
          <div class="s">안내/자격/제출물</div>
        </a>

        <a class="circle-link" href="notice.html">
          <div class="icon">📢</div>
          <div class="t">공지사항</div>
          <div class="s">변경/추가 안내</div>
        </a>

        <a class="circle-link" href="faq.html">
          <div class="icon">❓</div>
          <div class="t">FAQ</div>
          <div class="s">자주 묻는 질문</div>
        </a>

        <!-- ✅ 구글폼 링크를 여기에 붙이세요 -->
        <a class="circle-link" href="https://forms.gle/jf6Am7aht3RuxFDf9" target="_blank" rel="noopener">
          <div class="icon">⬆️</div>
          <div class="t">제출하기</div>
          <div class="s">구글폼으로 이동</div>
        </a>
      </div>
    </div>
  </div>

  <footer>
    한-아랍 스타트업 아이디어 공모전 운영사무국
  </footer>
</body>
</html>
